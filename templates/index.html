<!DOCTYPE html>
<html>
<head>
<title>Loan Approval System</title>
<style>
body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

.container{
background:white;
width:400px;
margin:auto;
padding:20px;
margin-top:50px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select{
width:90%;
padding:8px;
margin:8px;
}

button{
padding:10px 20px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#result{
font-size:20px;
margin-top:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Loan Approval Prediction</h2>

<input type="number" id="age" placeholder="Age">

<input type="number" id="income" placeholder="Income">

<input type="number" id="loan_amount" placeholder="Loan Amount">

<input type="number" id="credit_score" placeholder="Credit Score">

<input type="number" id="employment_years" placeholder="Employment Years">

<input type="number" id="dependents" placeholder="Dependents">

<select id="married">
<option value="yes">Married</option>
<option value="no">Not Married</option>
</select>

<select id="education">
<option value="graduate">Graduate</option>
<option value="not_graduate">Not Graduate</option>
</select>

<button onclick="predict()">Check Loan Status</button>

<div id="result"></div>

</div>

<script>

function predict(){

const data = {

age:parseInt(document.getElementById("age").value),
income:parseInt(document.getElementById("income").value),
loan_amount:parseInt(document.getElementById("loan_amount").value),
credit_score:parseInt(document.getElementById("credit_score").value),
employment_years:parseInt(document.getElementById("employment_years").value),
dependents:parseInt(document.getElementById("dependents").value),
married:document.getElementById("married").value,
education:document.getElementById("education").value

};

fetch("/predict",{

method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(data)

})
.then(res=>res.json())
.then(data=>{

document.getElementById("result").innerHTML =
"Loan Status: " + data["Loan Status"];

})

}

</script>

</body>
</html>
